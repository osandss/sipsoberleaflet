<!DOCTYPE html>
<html>
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="/sipsoberleaflet/manifest.json">
  <meta name="theme-color" content="#202329">
  <link rel="apple-touch-icon" href="/sipsoberleaflet/icons/icon-192.png">
  <link rel="icon" href="/sipsoberleaflet/icons/icon-192.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />

  <!-- FIX: Leaflet JS in <head> so it's parsed before DOMContentLoaded -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin="anonymous"></script>

  <style>

    .leaflet-container { position: relative; }

    .leaflet-container::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(40, 52, 95, 0.12);
      z-index: 200;
    }

    .leaflet-container::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 32%, rgba(255,255,255,0) 0%, rgba(27,30,49,0.03) 60%, rgba(27,30,49,0.06) 100%);
      opacity: 0.9;
      z-index: 300;
    }

    :root {
      --panel-collapsed: 18vh;
      --panel-expanded: 38vh;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: #ffffff;
      color: #1c1c1e;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.45;
      font-size: 12px;
    }

    #filters {
      position: fixed;
      top: 10px;
      left: 20px;
      right: 12px;
      z-index: 3100;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 5px 10px;
      background: rgba(248, 246, 242, 0.82);
      border-radius: 16px;
      border: 1px solid rgba(214, 218, 228, 0.75);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .ss-searchTop {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 26px;
      padding: 0 10px;
      background: transparent;
      border: none;
      border-radius: 999px;
      font-size: 12px;
      width: 160px;
      min-width: 160px;
      max-width: 160px;
      flex: 0 0 160px;
      overflow: hidden;
    }

    .ss-searchIcon { font-size: 11px; opacity: 0.6; }

    #searchTopInput {
      border: 0;
      outline: none;
      background: transparent;
      width: 100%;
      font-size: 16px;
      min-width: 0;
      line-height: 1;
      transform: scale(0.82);
      transform-origin: left center;
    }

    #searchTopInput::-webkit-search-cancel-button { -webkit-appearance: none; }

    #searchTopClear {
      border: 0;
      background: transparent;
      font-size: 16px;
      line-height: 1;
      opacity: 0.6;
      cursor: pointer;
      padding: 0;
    }

    #searchToggle {
      border: none;
      background: transparent;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 16px;
      cursor: pointer;
      color: #2f3b69;
    }

    #searchTopRow {
      display: none;
      width: 100%;
      margin-top: 4px;
      padding-left: 6px;
    }

    #searchTopRow.is-open { display: block; }

    .dropdown > button {
      background: transparent;
      border: none;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      color: #2f3b69;
    }

    .dropdown .menu {
      max-height: 160px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    #goBtn {
      background: #202329;
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
    }

    /* ═══════════════════════════════════════════════
       FIX 1: #map uses position:fixed (not absolute).
       This is the #1 cause of the grey-tile flash and
       the layout jump — absolute sizing races against
       iOS's async layout pipeline.
       ─────────────────────────────────────────────── */
    #map {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;

      /* Warm fallback so blank area is never cold grey */
      background: #f0ede8;

      /* Promote to GPU compositor layer before tiles arrive */
      will-change: transform;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    body.map-loading #map {
      opacity: 0;
    }

    body.map-ready #map {
      opacity: 1;
      transition: opacity 0.18s ease;
    }
    
    @supports (height: 100dvh) { #map { height: 100dvh; } }

    /* Match #map fallback — no grey flash between map div and tiles */
    .leaflet-container { background: #f0ede8; }

    .dropdown { position: relative; }

    .dropdown .menu {
      display: none;
      position: absolute;
      top: 120%;
      left: 0;
      background: #ffffff;
      border: 1px solid #e2e4ec;
      border-radius: 16px;
      padding: 10px 12px;
      width: 200px;
      z-index: 3000;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16);
    }

    .dropdown.open .menu { display: block; }

    .dropdown .row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      margin: 0;
      font-size: 12px;
      color: #1c1c1e;
    }

    #bottom-panel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 0;
      height: var(--panel-collapsed);
    
      background: rgba(27, 30, 49, 0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.18);
    
      display: flex;
      flex-direction: column;
      padding: 8px 14px calc(10px + env(safe-area-inset-bottom));
      z-index: 2001;
      overflow: hidden;
    }
    
    #bottom-panel.expanded { height: var(--panel-expanded); }

    #panel-header {
      flex: 0 0 auto;
      padding: 0 10px 2px;
    }

    #panel-body {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 0 10px;
    }

    #results { padding: 0; }

    #panel-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 2px;
    }

    #panel-meta-row .active-filters {
      flex: 1 1 auto;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;
      position: static;
      top: auto;
      background: transparent;
    }

    #sortBtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    
      padding: 3px 8px;
      border-radius: 999px;
    
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.01em;
    
      color: rgba(255,255,255,0.65);
    
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    
      cursor: default;
      pointer-events: none;
    
      opacity: 0.85;
    }
    
    #panel-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 6px 0 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #panel-toggle .handle {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.18);
    }

    #panel-toggle .label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      opacity: 1;
    }

    #results-count {
      flex: 0 0 auto;
      margin: 0;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.62);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .card {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      margin-bottom: 0;
      font-size: 12px;
      color: #333;
      line-height: 1.25;
    }

    .card:last-child { border-bottom: none; }

    .card-name {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 2px 0;
      line-height: 1.18;
      color: rgba(255,255,255,0.96);
      cursor: pointer;
    }

    .card-name:hover { text-decoration: underline; }
    .card .meta { margin: 0; line-height: 1.22; }
    #bottom-panel .card p { margin: 0; line-height: 1.32; }

    .leaflet-control-zoom { bottom: 20px; right: 20px; left: auto !important; top: auto !important; }

    .leaflet-top.leaflet-left {
      top: auto !important;
      left: auto !important;
      right: 16px !important;
      bottom: 24px !important;
      z-index: 3200 !important;
    }

    .active-filters { display: none; }

    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    
      padding: 5px 10px;
      border-radius: 999px;
    
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
    
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.01em;
    
      color: rgba(255,255,255,0.9);
    }

    .filter-pill-x {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    
      width: 16px;
      height: 16px;
      border-radius: 999px;
    
      background: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.95);
    
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    
      cursor: pointer;
    }

    @media (max-width: 720px) { #filters { top: 10px; } }

    body.ss-embed #filters { display: none !important; }

    .fav-btn {
      background: none;
      border: 0;
      padding: 4px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      color: rgba(255,255,255,0.36);
    }

    .fav-btn.is-fav {
      color: rgba(255,255,255,0.92);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .card {
      cursor: pointer;
    }
    
    .leaflet-popup-content-wrapper {
      border-radius: 18px !important;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18) !important;
      padding: 0 !important;
    }

    .leaflet-popup-content { margin: 0 !important; width: auto !important; max-width: none !important; }

    .ss-popup--simple {
      padding: 12px;
      min-width: 240px;
      max-width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      color: #1c1c1e;
    }

    .ss-popup-top { display: flex; gap: 12px; align-items: flex-start; }
    .ss-popup-text { flex: 1; min-width: 0; }
    .ss-popup-img-wrap { margin: 0; flex: 0 0 104px; display: block; }

    .ss-popup-img {
      width: 104px;
      height: 78px;
      max-height: none;
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }

    .ss-popup--simple .ss-popup-title { font-size: 13px; font-weight: 700; line-height: 1.2; margin: 0 0 4px; }
    .ss-popup--simple .ss-popup-tags { font-size: 11px; color: rgba(28,28,30,0.55); line-height: 1.2; margin: 0 0 6px; }
    .ss-popup--simple .ss-popup-meta { font-size: 11px; color: rgba(28,28,30,0.65); line-height: 1.25; margin: 0 0 8px; }

    .ss-popup--simple .ss-popup-actions {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      align-items: center;
      margin-top: 6px;
    }

    .ss-popup--simple .ss-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      padding: 5px 9px;
      border-radius: 999px;
      color: #1c1c1e;
      text-decoration: none;
      background: rgba(28,28,30,0.06);
      border: 1px solid rgba(28,28,30,0.08);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .ss-popup--simple .ss-pill.secondary { background: rgba(28,28,30,0.03); }
    .ss-popup--simple .ss-pill:active { background: rgba(28,28,30,0.12); transform: scale(0.97); }

    .leaflet-container a.leaflet-popup-close-button {
      width: 26px !important; height: 26px !important;
      font-size: 18px !important; line-height: 26px !important;
      color: rgba(28,28,30,0.45) !important;
      right: 6px !important; top: 6px !important;
    }

    .ss-popup--simple {
      padding: 14px;
      min-width: 248px;
      max-width: 304px;
    }
    
    .ss-popup-top {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    
    .ss-popup-img-wrap {
      margin: 0;
      flex: 0 0 110px;
      display: block;
    }
    
    .ss-popup-img {
      width: 110px;
      height: 84px;
      object-fit: cover;

      display: block;
    }
    
    .ss-popup--simple .ss-popup-title {

    }
    
    .ss-popup-featured {
      font-size: 12px;
      font-weight: 600;
      color: #202239;
      line-height: 1.25;
      margin: 0 0 7px;
    }
    
    .ss-popup-badge-row {
      display: flex;
      gap: 6px;
      margin: 0 0 8px;
    }
    
    .ss-popup-badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(32,34,57,0.06);
      border: 1px solid rgba(32,34,57,0.08);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #202239;
    }
    
    .card {
      position: relative;
    
      background: #2C3148;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.05);
    
      padding: 12px 10px;
      margin-bottom: 10px;
    
      font-size: 12px;
      color: rgba(255,255,255,0.96);
      line-height: 1.25;
    
      box-shadow: 0 6px 16px rgba(0,0,0,0.16);
    
      cursor: pointer;
      transition:
        background 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease,
        transform 180ms ease;
    }
    
    .card.is-selected {
      background: #2C3148;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
      transform: translateY(-1px);
    }
    
    .card.is-selected .card-name {
      color: rgba(255,255,255,0.96);
    }
    
    .card.is-selected::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 0;
      height: 1px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
    }
    
    .card-main-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    
    .card-image-wrap {
      width: 118px;
      flex: 0 0 118px;
    }
    
    .card-image {
      width: 118px;
      height: 96px;
      object-fit: cover;
      border-radius: 14px;
      display: block;
      background: rgba(28,28,30,0.06);
    }
    
    .card-content {
      flex: 1;
      min-width: 0;
    }
    
    .card-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 1px;
    }
    
    .card-text {
      flex: 1;
      min-width: 0;
    }
    
    .card-name {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 2px 0;
      line-height: 1.2;
      letter-spacing: -0.015em;
      color: rgba(255,255,255,0.96);
      cursor: pointer;
    }
    
    .card .meta {
      margin: -2px 0 4px;
      line-height: 1.2;
      color: rgba(255,255,255,0.58);
    }
    
    .card-featured {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      color: rgba(255,255,255,0.92);
      margin: 0 0 6px;
    }
    
    .card-badge-row {
      display: flex;
      gap: 6px;
    }
    
    .card-badge {
      display: inline-flex;
      align-items: center;
      height: 21px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(32,34,57,0.05);
      border: 1px solid rgba(32,34,57,0.08);
      font-size: 10.5px;
      font-weight: 700;
      color: #202239;
    }
    
    .card-selected-extra {
      display: none;
    }
    
    .card.is-selected .card-selected-extra {
      display: block;
      margin-top: 8px;
    }
    
    .card-selected-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 6px;
    }
    
    .card-selected-pill {
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      height: 28px;
      padding: 0 12px;
      min-width: auto;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      text-decoration: none !important;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.94);
      box-sizing: border-box;
      vertical-align: middle;
    }
    
    .card-selected-pill.primary {
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .ss-onboard {

      left: 50%;
      transform: translateX(-50%) translateY(8px);
      top: 140px;
      z-index: 5000;
      width: calc(100% - 32px);
      max-width: 420px;
      opacity: 0;
      transition: opacity 220ms ease, transform 220ms ease;
      pointer-events: none;
    }

    .ss-onboard.is-visible { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .ss-onboard[hidden] { display: none !important; }

    .ss-onboard__content {

      border: 1px solid rgba(32,34,57,0.12);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.12);

    .ss-onboard__title { font-size: 14px; font-weight: 800; color: #202239; margin-bottom: 4px; }

/* ─────────────────────────────────────────────────────────────────
   FIX 2: Map initialises AFTER the browser has completed its first
   paint. This guarantees Leaflet reads the true #map dimensions,
   which eliminates both the grey-tile gap and the layout jump.
   ───────────────────────────────────────────────────────────────── */
function _initMap(){
  map = L.map("map",{
    zoomControl: false,
    scrollWheelZoom: true,
    preferCanvas: true,
    // FIX 3: tap:false stops Leaflet's iOS tap shim from triggering
    // an unwanted invalidateSize() that causes the visible jump.
    tap: false
  }).setView([40.778,-73.985],12.1);

  const tiles = L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
    maxZoom: 20,
    subdomains: "abcd",
    attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
    updateWhenIdle: true,
    keepBuffer: 6,
    detectRetina: false,
    updateWhenZooming: false
  });

  tiles.addTo(map);

  tiles.once("load", () => {
    document.body.classList.remove("map-loading");
    document.body.classList.add("map-ready");
    if (map) {
      map.invalidateSize({ animate: false, pan: false });
    }
  });

  map.setMaxBounds(manhattanLockBounds);
  map.options.maxBoundsViscosity = 0.1;
  map.setMinZoom(11.5);
  markersLayer = L.layerGroup().addTo(map);

  /* ─── FIX 5: Clean, two-step invalidateSize sequence ────────────
     • rAF frame 1 → layout is done
     • rAF frame 2 → paint is done → NOW call invalidateSize
     • 300 ms later → catch any WKWebView async settle
  ────────────────────────────────────────────────────────────── */
  function kickSize() {
    if (!map) return;
    requestAnimationFrame(() => {
      map.invalidateSize({ animate: false, pan: false });
    });
  }

  map.whenReady(() => {
    kickSize();
    setTimeout(() => {
      if (map) map.invalidateSize({ animate: false, pan: false });
    }, 150);
  });

  window.addEventListener("resize", kickSize);
  window.addEventListener("orientationchange", () => {
    setTimeout(kickSize, 150);
  });

  map.on("click", () => {
    clearVenueSelection();
  });

  _buildIcons();
  applyIconForViewport();
  mobileQuery.addEventListener("change", applyIconForViewport);

  _mapReady = true;
  if(_pendingUserLocation){
    window.SipSober.setUserLocation(_pendingUserLocation.lat,_pendingUserLocation.lng);
    _pendingUserLocation = null;
  }

  applyFiltersUnified();
  window.SipSober?.sendVenuesToNative?.();
  kickSize();
}

// Start the map as soon as the DOM is ready
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", () => {
    requestAnimationFrame(_initMap);
  });
} else {
  requestAnimationFrame(_initMap);
}

/* ─── ICONS ────────────────────────────────────────────────────── */
function makePinIconSVG(hex="#2D334D", size=[28,38], opts={}){
  const [w,h] = size;
  const ring = opts.ring ?? false;
  const innerDot = opts.innerDot ?? "#F7F8FB";

  return `
  <svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 28 38">
    ${ring ? `
      <path
        d="M14 0C6.82 0 1 5.82 1 13c0 9.75 11.4 23.4 12.01 24.13a1.25 1.25 0 0 0 1.98 0C15.6 36.4 27 22.75 27 13 27 5.82 21.18 0 14 0z"
        fill="none"
        stroke="rgba(45,51,77,0.18)"
        stroke-width="1.4"
      />
    ` : ""}

    <path
      d="M14 0C6.82 0 1 5.82 1 13c0 9.75 11.4 23.4 12.01 24.13a1.25 1.25 0 0 0 1.98 0C15.6 36.4 27 22.75 27 13 27 5.82 21.18 0 14 0z"
      fill="${hex}" opacity="0.92"
      stroke="rgba(255,255,255,0.05)"
      stroke-width="0.45"
    />

    <circle cx="14" cy="13" r="3.4" fill="${innerDot}" />
  </svg>`;
}

function makeIcon(size=[28,38], color="#2D334D", isActive=false){
  return L.icon({
    iconUrl: "data:image/svg+xml;utf8," + encodeURIComponent(
      makePinIconSVG(color, size, {
        ring: isActive,
        innerDot: "#F7F8FB"
      })
    ),
    iconSize: size,
    iconAnchor: [Math.floor(size[0] / 2), size[1]],
    popupAnchor: [0, -Math.floor(size[1] * 0.84)]
  });
}

function _buildIcons(){
  const isMobile = mobileQuery.matches;

  const size = isMobile ? [13,19] : [20,28];
  const activeSize = isMobile ? [15,22] : [23,32];

  defaultIcon = makeIcon(size, "#2D334D", false);
  activeIcon  = makeIcon(activeSize, "#2D334D", true);

  currentIcon = defaultIcon;
  L.Marker.prototype.options.icon = currentIcon;
}

const __origMarkerFactory = L.marker;
L.marker = function(latlng,options){
  const opts=options||{};
  if(!opts.icon) opts.icon=currentIcon||makeIcon();
  return __origMarkerFactory.call(this,latlng,opts);
};

function setActiveMarker(m){
  if(_activeMarker&&_activeMarker!==m) _activeMarker.setIcon(defaultIcon);
  _activeMarker=m||null;
  if(_activeMarker) _activeMarker.setIcon(activeIcon);
}

function clearActiveMarker(){
  if(_activeMarker) _activeMarker.setIcon(defaultIcon);
  _activeMarker=null;
}

function applyIconForViewport(){
  if(!map) return;
  _buildIcons();
  if(markersLayer&&markersLayer.eachLayer){
    markersLayer.eachLayer(layer=>{
      if(!layer||typeof layer.setIcon!=="function") return;
      layer.setIcon(layer===_activeMarker?activeIcon:defaultIcon);
    });
  }
}

function normalizeUrl(u){
  u=String(u||"").trim();
  if(!u||u.toLowerCase()==="n/a") return "";
  if(!/^https?:\/\//i.test(u)) u="https://"+u;
  return u;
}

function getSelectedValues(prefix){

}

function matchesSearch(loc,q){
  if(!q) return true;
  return [loc.name,loc.address,loc.brand,loc.neighborhood].filter(Boolean).join(" ").toLowerCase().includes(q.toLowerCase());

/* ─── FILTER CHIPS ─────────────────────────────────────────────── */
function updateActiveFilters(selectedBrands,selectedNeighborhoods){
  const c=document.getElementById("active-filters");
  if(!c) return;
  c.innerHTML="";
  const has=selectedBrands.length||selectedNeighborhoods.length;
  c.style.display=has?"flex":"none";
  if(!has) return;
  function pill(type,value){
    const p=document.createElement("span"); p.className="filter-pill";
    const x=document.createElement("span"); x.className="filter-pill-x"; x.textContent="×";
    const l=document.createElement("span"); l.textContent=value;
    x.addEventListener("click",()=>clearSingleFilter(type,value));
    p.appendChild(x); p.appendChild(l); c.appendChild(p);
  }
  selectedNeighborhoods.forEach(n=>pill("neighborhood",n));
  selectedBrands.forEach(b=>pill("brand",b));
}

function clearSingleFilter(type,value){
  if(type==="brand") document.querySelectorAll('input[id^="brand-"]').forEach(cb=>{if(cb.value===value)cb.checked=false;});
  else document.querySelectorAll('input[id^="n-"]').forEach(cb=>{if(cb.value===value)cb.checked=false;});
  applyFiltersUnified();
}

/* ─── NATIVE BRIDGE ────────────────────────────────────────────── */
let _didSendVenuesToNative=false;
function _brandsArrayFromString(s){return String(s||"").split(",").map(x=>x.trim()).filter(Boolean);}
function _venueForNative(loc){return{id:String(loc.id||""),name:String(loc.name||""),address:String(loc.address||""),neighborhood:String(loc.neighborhood||""),brands:_brandsArrayFromString(loc.brand),website:normalizeUrl(loc.website||""),lat:Number(loc.lat||0),lng:Number(loc.lng||0),imageUrl:String(loc.imageUrl||"")};}

window.SipSober.sendVenuesToNative=function(arg){
  try{
    const force=(typeof arg==="boolean")?arg:false;
    const source=Array.isArray(arg)?arg:(locations||[]);
    if(_didSendVenuesToNative&&!force&&!Array.isArray(arg)) return;
    const venues=source.map(_venueForNative).filter(v=>v.id&&v.name);
    if(window.webkit?.messageHandlers?.sipSober){
      window.webkit.messageHandlers.sipSober.postMessage({type:"venues",venues});
      _didSendVenuesToNative=true;
    }
  }catch(e){}
};

window.addEventListener("load",()=>setTimeout(()=>window.SipSober.sendVenuesToNative(),400));

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[ch]));
}

function firstBrands(brandString, max = 2){
  return String(brandString || "")
    .split(",")
    .map(s => s.trim())
    .filter(Boolean)
    .slice(0, max)
    .join(", ");
}


function getLocationById(id){
  return locations.find(v => String(v.id) === String(id)) || null;
}

function clearSelectedPinLabel(){
  if(_selectedLabelMarker){
    try { map?.removeLayer(_selectedLabelMarker); } catch(e){}
    _selectedLabelMarker = null;
  }
}

function showSelectedPinLabel(loc){
  if(!map || !loc) return;

  clearSelectedPinLabel();

  const labelHtml = `
    <div class="ss-pin-label">${escapeHtml(loc.name || "")}</div>
  `;

  _selectedLabelMarker = L.marker([loc.lat, loc.lng], {
    interactive: false,
    keyboard: false,
    zIndexOffset: 1000,
    icon: L.divIcon({
      className: "ss-pin-label-wrap",
      html: labelHtml,
      iconSize: null,
      iconAnchor: [0, 42]
    })
  }).addTo(map);
}
  
function selectVenue(loc, opts = {}){
  if(!loc || !map) return;

  const {
    centerMap = true,
    zoom = 16,
    animate = true
  } = opts;

  _selectedVenueId = String(loc.id || "");
  _lastFocusedVenueId = _selectedVenueId;

  if(centerMap){
    map.invalidateSize(false);
    map.setView([loc.lat, loc.lng], zoom, { animate });
  }

  const panel = document.getElementById("bottom-panel");
  if(panel) panel.classList.add("expanded");

  applyFiltersUnified();

  const marker = markersById[_selectedVenueId];
  if(marker) setActiveMarker(marker);

  showSelectedPinLabel(loc);

  requestAnimationFrame(() => {
    syncSelectedListRow();
  });
}

function syncSelectedListRow(){
  const results = document.getElementById("results");
  if(!results) return;

  results.querySelectorAll(".card").forEach(card => {
    card.classList.remove("is-selected");
  });

  if(!_selectedVenueId) return;

  const escapedId = window.CSS && CSS.escape ? CSS.escape(_selectedVenueId) : _selectedVenueId;
  const selected = results.querySelector(`.card[data-venue-id="${escapedId}"]`);
  if(!selected) return;

  selected.classList.add("is-selected");
  selected.scrollIntoView({
    behavior: "smooth",
    block: "nearest"
  });
}

function clearVenueSelection(){
  _selectedVenueId = null;
  _lastFocusedVenueId = null;
  clearActiveMarker();
  clearSelectedPinLabel();

  applyFiltersUnified();
}
  
/* ─── RENDERERS ────────────────────────────────────────────────── */
function renderMarkers(data){
  if(!markersLayer) return { count:0, bounds:null };
  markersLayer.clearLayers();
  clearActiveMarker();
  clearSelectedPinLabel();
  markersById = {};

  const bounds = L.latLngBounds([]);

  data.forEach(loc => {
    const m = L.marker([loc.lat, loc.lng]).addTo(markersLayer);

    m.on("click", (e) => {
      if(e.originalEvent) L.DomEvent.stopPropagation(e.originalEvent);
      selectVenue(loc, { centerMap:false, animate:false });
    });

    if(loc.id) markersById[String(loc.id)] = m;
    bounds.extend([loc.lat, loc.lng]);
  });

  return { count:data.length, bounds:data.length ? bounds : null };
}

function renderList(data){
  const results = document.getElementById("results");
  const rc = document.getElementById("results-count");
  if(!results) return;

  results.innerHTML = "";
  if(rc) rc.textContent = data.length === 0 ? "No places found" : `${data.length} place${data.length === 1 ? "" : "s"}`;

  data.forEach(loc => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.venueId = String(loc.id || "");
    const isSelected = _selectedVenueId === String(loc.id);

    const distance = _distanceLabelForVenue(loc);
    const neighborhood = loc.neighborhood || "";
    const brands = firstBrands(loc.brand, 2);
    const metaLine = [distance, neighborhood, brands].filter(Boolean).join(" • ");

    let contextLine = "";

    if (loc.featuredDrink) {
      contextLine = `<div class="card-featured">${escapeHtml(loc.featuredDrink)}</div>`;
    } else {
      contextLine = `<div class="card-featured">Zero-proof cocktails</div>`;
    }

    const web = normalizeUrl(loc.website);
    const directionsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((loc.name || "") + " " + (loc.address || ""))}`;

    const cardImage = loc.imageUrl
      ? `<img class="card-image" src="${escapeHtml(loc.imageUrl)}" alt="${escapeHtml(loc.name || "")}" loading="lazy" onerror="this.remove()">`
      : `<div class="card-image"></div>`;

    const selectedExtras = isSelected ? `
      <div class="card-selected-extra">
        <div class="card-selected-actions">
          <a class="card-selected-pill primary" href="${directionsUrl}" target="_blank" rel="noopener">Directions</a>
          ${web ? `<a class="card-selected-pill" href="${web}" target="_blank" rel="noopener">Website</a>` : ""}
        </div>
      </div>
    ` : "";

    card.innerHTML = `
      <div class="card-main-row">
        <div class="card-image-wrap">
          ${cardImage}
        </div>
    
        <div class="card-content">
          <div class="card-header-row">
            <div class="card-text">
              <span class="card-name" data-focus-id="${escapeHtml(loc.id)}">${escapeHtml(loc.name)}</span>
            </div>
    
            ${
              isSelected
                ? `<button class="card-close-btn" type="button" aria-label="Close selected card">×</button>`
                : `<button class="fav-btn" data-id="${escapeHtml(loc.id)}" aria-label="Favorite">★</button>`
            }
          </div>
    
          ${metaLine ? `<div class="meta">${escapeHtml(metaLine)}</div>` : ""}
          ${contextLine}
          ${selectedExtras}
        </div>
      </div>
    `;

    card.addEventListener("click", (e) => {
      if(e.target.closest(".fav-btn")) return;
    
      if(e.target.closest(".card-close-btn")) {
        e.preventDefault();
        e.stopPropagation();
        clearVenueSelection();
        return;
      }
    
      if(e.target.closest("a")) return;
      window.SipSober?.focusVenue?.(loc.id);
    });

    results.appendChild(card);
  });

  window.SipSober?.sendVenuesToNative?.(data);

  requestAnimationFrame(() => {
    syncSelectedListRow();
  });
}

/* ─── FILTER + APPLY ────────────────────────────────────────────── */
function applyFiltersUnified(){
  closeAllMenus();
  const brands=getSelectedValues("brand"), hoods=getSelectedValues("n");
  const q=(document.getElementById("searchTopInput")?.value||"").trim();
  let filtered=locations.filter(loc=>{
    const brandOK=brands.length?brands.some(b=>(loc.brand||"").toLowerCase().includes(b.toLowerCase())):true;
    const hoodOK=hoods.length?hoods.includes(loc.neighborhood):true;
    return brandOK&&hoodOK&&matchesSearch(loc,q);
  });
  const hasLoc=!!_userLocationForDistance;
  if(hasLoc){
    filtered.sort((a,b)=>{
      const da=_distanceMilesForVenue(a),db=_distanceMilesForVenue(b);
      if(da==null&&db==null) return (a.name||"").localeCompare(b.name||"",undefined,{sensitivity:"base"});
      if(da==null) return 1; if(db==null) return -1;
      if(da!==db) return da-db;
      return (a.name||"").localeCompare(b.name||"",undefined,{sensitivity:"base"});
    });
  } else {
    filtered.sort((a,b)=>(a.name||"").localeCompare(b.name||"",undefined,{sensitivity:"base"}));
  }
  const sortBtn=document.getElementById("sortBtn");
  if(sortBtn) sortBtn.textContent=hasLoc?"Miles":"A–Z";
  renderList(filtered);
  if(!map) return;
  const{count,bounds}=renderMarkers(filtered);
  updateActiveFilters(brands,hoods);
  const panel=document.getElementById("bottom-panel");
  const panelH=panel?panel.getBoundingClientRect().height:0;
  
  const isDefaultView =
    !brands.length &&
    !hoods.length &&
    !q.length &&
    !hasLoc;

    if (!_suppressAutoFit) {
    if (isDefaultView) {
      fitInitialView();
    } else if (count > 0 && bounds) {
      map.fitBounds(bounds, {
        paddingTopLeft: [16, window.SipSober?.isEmbed ? 80 : 120],
        paddingBottomRight: [16, panelH + 40],
        maxZoom: 16,
        animate: false
      });
    }
  }

  if (_selectedVenueId) {
    const stillVisible = filtered.some(v => String(v.id) === String(_selectedVenueId));
    if (!stillVisible) {
      clearVenueSelection();
    }
  }
  
  window.filteredBounds=bounds;
}

function applyFiltersWithUserLocation(){applyFiltersUnified();}
function applyFilters(){applyFiltersUnified();}

/* ─── LOCATION BRIDGE ───────────────────────────────────────────── */
function _showUserLocation(lat,lng){
  if(!map) return;
  const ll=L.latLng(lat,lng);
  if(_userDot){try{map.removeLayer(_userDot);}catch(e){}_userDot=null;}
  if(_userHalo){try{map.removeLayer(_userHalo);}catch(e){}_userHalo=null;}
  _userHalo=L.circle(ll,{radius:120,stroke:false,fill:true,fillOpacity:0.12}).addTo(map);
  _userDot=L.circleMarker(ll,{radius:6,stroke:true,weight:2,opacity:1,fill:true,fillOpacity:1}).addTo(map);
}

function _clearUserLocationLayers(){
  if(_userDot){try{map.removeLayer(_userDot);}catch(e){}_userDot=null;}
  if(_userHalo){try{map.removeLayer(_userHalo);}catch(e){}_userHalo=null;}
}

function _haversineMiles(lat1,lon1,lat2,lon2){
  const r=v=>(v*Math.PI)/180, R=3958.7613;
  const dLat=r(lat2-lat1),dLon=r(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function _distanceMilesForVenue(loc){
  if(!_userLocationForDistance) return null;
  const lat=Number(loc?.lat),lng=Number(loc?.lng);
  if(!Number.isFinite(lat)||!Number.isFinite(lng)) return null;
  const m=_haversineMiles(_userLocationForDistance.lat,_userLocationForDistance.lng,lat,lng);
  return Number.isFinite(m)?m:null;
}

function _distanceLabelForVenue(loc){
  if(!_userLocationForDistance) return "";
  const m=_distanceMilesForVenue(loc);
  if(m==null) return "";
  return m<0.1?"<0.1 mi":`${m.toFixed(1)} mi`;
}

window.SipSober.setUserLocation=function(lat,lng){
  const LAT=Number(lat),LNG=Number(lng);
  if(!Number.isFinite(LAT)||!Number.isFinite(LNG)) return;
  if(!_mapReady){_pendingUserLocation={lat:LAT,lng:LNG};return;}
  _pendingUserLocation=null;
  _showUserLocation(LAT,LNG);
  _userLocationForDistance={lat:LAT,lng:LNG};
  applyFiltersUnified();
  map.invalidateSize(false);
  map.setView([LAT,LNG],Math.max(map.getZoom(),15),{animate:true});
  const panel=document.getElementById("bottom-panel");
  if(panel) panel.classList.add("expanded");
};

window.SipSober.clearUserLocation=function(){
  _pendingUserLocation=null; _userLocationForDistance=null;
  applyFiltersUnified();
  if(!_mapReady) return;
  _clearUserLocationLayers();
};

window.SipSober.resetMapToDefault=function(){resetMapToDefault();};
window.setUserLocation  =function(lat,lng){window.SipSober.setUserLocation(lat,lng);};
window.clearUserLocation=function(){window.SipSober.clearUserLocation();};
window.resetMapToDefault=function(){window.SipSober.resetMapToDefault();};

/* ─── RESET ─────────────────────────────────────────────────────── */
function fitInitialView(){
  if(!map) return;

  const panel = document.getElementById("bottom-panel");
  const panelH = panel ? panel.getBoundingClientRect().height : 0;

  const defaultBounds = L.latLngBounds(
    [40.715, -74.03],  // lower-left (trim lower Manhattan)
    [40.835, -73.93]   // upper-right (show more upper Manhattan)
  );

  map.fitBounds(defaultBounds, {
    paddingTopLeft: [16, window.SipSober?.isEmbed ? 75 : 115],
    paddingBottomRight: [16, panelH + 30],
    animate: false
  });
}

function resetMapToDefault(){
  closeAllMenus();
  document.getElementById("searchTopRow")?.classList.remove("is-open");
  document.getElementById("searchToggle")?.setAttribute("aria-expanded","false");

  document.querySelectorAll('input[id^="brand-"],input[id^="n-"]').forEach(cb => {
    cb.checked = false;
  });

  const si = document.getElementById("searchTopInput");
  if (si) si.value = "";

  _suppressAutoFit = true;

  // Clear all selected venue UI/state first
  clearVenueSelection();

  // Clear user location directly here (do NOT call window.SipSober.clearUserLocation)
  _pendingUserLocation = null;
  _userLocationForDistance = null;
  if (_mapReady) _clearUserLocationLayers();

  // Render once from a clean state
  applyFiltersUnified();
  updateActiveFilters([], []);

  if (map) {
    map.invalidateSize({ animate: false, pan: false });
    fitInitialView();
  }

  // Final cleanup after render
  requestAnimationFrame(() => {
    clearVenueSelection();
  });

  _suppressAutoFit = false;
}

/* ─── FAVORITES + FOCUS ─────────────────────────────────────────── */
window.SipSober.setFavorites=function(payload){
  const ids=new Set((payload&&payload.ids)||[]);
  document.querySelectorAll(".fav-btn[data-id]").forEach(btn=>btn.classList.toggle("is-fav",ids.has(btn.dataset.id)));
};

window.SipSober.setFilters=function(payload){
  const brands=Array.isArray(payload?.brands)?payload.brands:[];
  const hoods=Array.isArray(payload?.neighborhoods)?payload.neighborhoods:[];
  document.querySelectorAll('input[id^="brand-"]').forEach(cb=>{cb.checked=brands.includes(cb.value);});
  document.querySelectorAll('input[id^="n-"]').forEach(cb=>{cb.checked=hoods.includes(cb.value);});
  applyFiltersUnified();
};

window.SipSober.focusVenue=function(payload){
  const id = String((typeof payload==="string" ? payload : payload?.venueId) || "").trim();
  if(!id) return;

  const loc = getLocationById(id);
  if(!loc) return;

  _selectedVenueId = id;
  _lastFocusedVenueId = id;

  const marker = markersById?.[id];
  if(marker){
    selectVenue(loc, { centerMap:true, zoom:16, animate:true });
    return;
  }

  // 👇 THIS IS THE KEY CHANGE
  // Reset to full dataset so we can ALWAYS find the venue
  renderList(locations.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"", undefined, { sensitivity:"base" })));
  const { bounds } = renderMarkers(locations);
  updateActiveFilters(getSelectedValues("brand"), getSelectedValues("n"));
  window.filteredBounds = bounds;

  let tries = 0;
  (function attempt(){
    const marker = markersById?.[id];
    if(!marker){
      if(++tries <= 25) return setTimeout(attempt, 120);
      clearVenueSelection();
      return;
    }
    selectVenue(loc, { centerMap:true, zoom:16, animate:true });
  })();
};

window.SipSober.focusVenueById=function(id){window.SipSober.focusVenue(id);};
window.SipSober.closePopup=function(){try{map?.closePopup();}catch(e){}};

/* ─── EVENT WIRING ──────────────────────────────────────────────── */
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeAllMenus();});

document.addEventListener("click",e=>{
  if(e.target.closest("a")){closeAllMenus();document.getElementById("searchTopRow")?.classList.remove("is-open");document.getElementById("searchToggle")?.setAttribute("aria-expanded","false");return;}
  const favBtn=e.target.closest(".fav-btn");
  if(favBtn){
    e.preventDefault();e.stopPropagation();
    const venueId=favBtn.dataset.id;
    const v=locations.find(x=>String(x.id)===String(venueId)); if(!v) return;
    favBtn.classList.toggle("is-fav");
    window.webkit?.messageHandlers?.favorites?.postMessage({action:"toggle",venue:{venueId:String(v.id),name:v.name||"",address:v.address||"",website:normalizeUrl(v.website||""),neighborhood:v.neighborhood||"",brands:v.brand||""}});
    return;
  }
  const nameEl=e.target.closest(".card-name[data-focus-id]");
  if(nameEl){e.preventDefault();e.stopPropagation();window.SipSober?.focusVenue(nameEl.dataset.focusId);return;}
  const btn=e.target.closest(".dropdown > button");
  if(btn){const p=btn.parentElement,willOpen=!p.classList.contains("open");closeAllMenus();if(willOpen){p.classList.add("open");btn.setAttribute("aria-expanded","true");}return;}
  if(!e.target.closest(".dropdown")) closeAllMenus();
  if(!e.target.closest("#searchTopRow")&&!e.target.closest("#searchToggle")){
    const row=document.getElementById("searchTopRow");
    if(row?.classList.contains("is-open")){row.classList.remove("is-open");document.getElementById("searchToggle")?.setAttribute("aria-expanded","false");document.getElementById("searchTopInput")?.blur();}
  }
});

document.querySelectorAll(".dropdown > button").forEach(btn=>{
  btn.setAttribute("aria-haspopup","true");
  const dd=btn.parentElement,menu=dd.querySelector(".menu");
  if(dd&&menu){const id=dd.id?dd.id+"-menu":"menu-"+Math.random().toString(36).slice(2);menu.id=id;btn.setAttribute("aria-controls",id);}
});

document.getElementById("goBtn")?.addEventListener("click",applyFiltersUnified);

(()=>{
  const toggle=document.getElementById("searchToggle"),row=document.getElementById("searchTopRow"),input=document.getElementById("searchTopInput");
  if(!toggle||!row) return;
  function openRow(){row.classList.add("is-open");toggle.setAttribute("aria-expanded","true");setTimeout(()=>input?.focus(),50);}
  function closeRow(){row.classList.remove("is-open");toggle.setAttribute("aria-expanded","false");input?.blur();}
  window.SipSober._openSearchRow=openRow; window.SipSober._closeSearchRow=closeRow;
  toggle.addEventListener("click",e=>{e.preventDefault();e.stopPropagation();row.classList.contains("is-open")?closeRow():openRow();});
})();

const searchInput=document.getElementById("searchTopInput");
const searchClear=document.getElementById("searchTopClear");
searchInput?.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();applyFiltersUnified();document.getElementById("searchTopRow")?.classList.remove("is-open");document.getElementById("searchToggle")?.setAttribute("aria-expanded","false");searchInput.blur();}});
searchClear?.addEventListener("click",()=>{if(searchInput)searchInput.value="";applyFiltersUnified();});

  
(()=>{
  const panel=document.getElementById("bottom-panel"),toggle=document.getElementById("panel-toggle"),label=toggle?.querySelector(".label");
  if(!panel||!toggle) return;

  function syncLabel(){
    const ex = panel.classList.contains("expanded");
    toggle.setAttribute("aria-expanded", ex ? "true" : "false");
    if(label) label.textContent = ex ? "Hide" : "Show";
  }

  toggle.addEventListener("click",e=>{
    e.stopPropagation();
    panel.classList.toggle("expanded");
    syncLabel();
  });

  if(window.matchMedia("(max-width:768px)").matches) panel.classList.add("expanded");
  syncLabel();
})();

// Render list immediately (map init is async but list doesn't need it)
renderList(locations.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"")));
</script>

<script>
(function(){
  const KEY="ss_seen_map_onboarding_v1";
  function showOnboarding(){
    if(localStorage.getItem(KEY)==="true") return;
    const el=document.getElementById("ss-onboard"); if(!el) return;
    el.hidden=false; requestAnimationFrame(()=>el.classList.add("is-visible"));
    const ok=document.getElementById("ss-onboard-ok");
    function dismiss(){localStorage.setItem(KEY,"true");el.classList.remove("is-visible");setTimeout(()=>(el.hidden=true),240);}
    ok?.addEventListener("click",dismiss);
  }
  window.addEventListener("load",()=>setTimeout(showOnboarding,450));
})();
</script>
